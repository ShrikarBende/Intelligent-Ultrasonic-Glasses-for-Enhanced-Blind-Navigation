<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Live Navigation Assistant</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    /* Enhanced CSS with status indicators */
    body { 
      font-family: 'Segoe UI', Arial, sans-serif;
      margin: 0;
      padding: 15px;
      background: #f8f9fa;
    }
    
    #map { 
      height: 55vh;
      margin: 15px 0;
      border-radius: 12px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.05);
    }

    .container {
      padding: 20px;
      background: white;
      border-radius: 12px;
      margin: 15px 0;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .status-indicator {
      padding: 10px;
      border-radius: 8px;
      margin: 10px 0;
      font-size: 0.9em;
      display: none;
    }

    .loading {
      background: #e3f2fd;
      color: #0d47a1;
    }

    .gps-status {
      background: #fff3cd;
      color: #856404;
    }

    select, button, input {
      padding: 12px 15px;
      margin: 10px 0;
      width: 100%;
      border: 2px solid #dee2e6;
      border-radius: 8px;
      font-size: 16px;
      transition: all 0.2s ease;
    }

    button {
      background-color: #1a73e8;
      color: white;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    button:hover {
      background-color: #1557b0;
      transform: translateY(-2px);
    }

    #currentInstruction {
      padding: 15px;
      background: #e8f5e9;
      border-radius: 8px;
      margin: 15px 0;
      font-size: 16px;
      line-height: 1.6;
      color: #2e7d32;
      min-height: 60px;
    }

    .test-mode {
      background: #fff8e6;
      border-left: 4px solid #ffc107;
    }

    .test-inputs {
      display: grid;
      gap: 12px;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    }

    #voiceBtn {
      position: fixed;
      bottom: 30px;
      right: 30px;
      width: 60px;
      height: 60px;
      background-color: #28a745;
      box-shadow: 0 6px 16px rgba(0,0,0,0.15);
      transition: all 0.2s ease;
    }

    @media (min-width: 768px) {
      #map {
        height: 65vh;
      }
      .container {
        max-width: 640px;
        margin: 15px auto;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1 style="color: #1a73e8; margin-bottom: 25px; text-align: center;">
      🧭 Blind Navigation Assistant
    </h1>
    
    <!-- Status Indicators -->
    <div id="loadingStatus" class="status-indicator loading">
      🔄 Initializing navigation system...
    </div>
    
    <div id="gpsStatus" class="status-indicator gps-status">
      📡 Acquiring GPS signal...
    </div>

    <div class="location-selectors">
      <div class="input-group">
        <label for="startLocation">📍 Current Location:</label>
        <select id="startLocation" aria-label="Select pickup location">
          <option value="">Choose starting point</option>
          <option value="Shivajinagar, Pune">Shivajinagar</option>
          <option value="Kothrud, Pune">Kothrud</option>
          <option value="Hadapsar, Pune">Hadapsar</option>
          <option value="Swargate, Pune">Swargate</option>
        </select>
      </div>

      <div class="input-group">
        <label for="endLocation">🏁 Destination:</label>
        <select id="endLocation" aria-label="Select destination">
          <option value="">Choose destination</option>
          <option value="Wakad, Pune">Wakad</option>
          <option value="Baner, Pune">Baner</option>
          <option value="Aundh, Pune">Aundh</option>
          <option value="Pimpri, Pune">Pimpri</option>
        </select>
      </div>

      <button onclick="startTracking()" style="margin-top: 20px;">
        🚀 Start Navigation
        <span id="loadingSpinner" style="display: none;">⏳</span>
      </button>
    </div>
  </div>

  <div class="container test-mode">
    <h3>🧪 Testing Controls</h3>
    <div class="test-inputs">
      <input type="number" id="testLat" step="any" 
             placeholder="Test Latitude (e.g., 18.5204)"
             aria-label="Enter test latitude">
      <input type="number" id="testLng" step="any"
             placeholder="Test Longitude (e.g., 73.8567)"
             aria-label="Enter test longitude">
    </div>
    <button onclick="enableTestMode()" style="background-color: #ffd54f; color: #6b4d00;">
      🔄 Simulate Destination
    </button>
  </div>

  <div id="map"></div>

  <div class="container">
    <p id="currentInstruction" aria-live="assertive" role="alert">
      🗣️ Navigation instructions will appear here...
    </p>
  </div>

  <button id="voiceBtn" onclick="startVoiceReading()" aria-label="Repeat current instruction">
    🔊
  </button>

  <!-- Libraries -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
  <script src="script.js"></script>
</body>
</html>
